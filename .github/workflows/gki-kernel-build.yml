name: Debug OPPO K10X Kernel Workflow

on:
  push:
    branches:
      - oppo/sm6375_u_14.0.0_k10x_5g
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Show repository root
        run: |
          echo "PWD: $(pwd)"
          echo "Top-level files:"
          ls -la || true

      - name: List potential defconfigs
        run: |
          echo "Searching for defconfig files (maxdepth 6):"
          find . -maxdepth 6 -type f -name '*defconfig' -print || true
